name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install Visual Studio Build Tools
        shell: pwsh
        run: |
          choco install visualstudio2026buildtools `
            --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended" `
            -y
          choco install cmake -y

      - name: Build
        shell: cmd
        run: |
          call "%ProgramFiles(x86)%\Microsoft Visual Studio\18\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          mkdir build
          cd build
          cmake .. -G "Visual Studio 18 2026"
          cmake --build . --config Release

      - name: Upload artifact/s
        uses: actions/upload-artifact@v6
        with:
          name: DLL
          path: |
            build/Release/cypress_GW1.dll
            build/Release/cypress_GW2.dll
            build/Release/cypress_BFN.dll
